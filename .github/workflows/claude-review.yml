name: Claude Code Review on master pushes

  # 1️⃣  Trigger only on pushes to the master branch
  on:
    push:
      branches:
        - master

  jobs:
    review:
      runs-on: ubuntu‑latest
      permissions:
        # Needed for the `gh` CLI to comment on the commit
        contents: read
        pull-requests: write

      steps:
        # 2️⃣  Check out the repository at the pushed commit
        - name: Checkout repository
          uses: actions/checkout@v4
          with:
            fetch-depth: 0   # ensures full history for blame, etc.

        # 3️⃣  Install the Claude Code CLI (replace with the exact install command you use)
        - name: Install Claude Code CLI
          run: |
            npm install -g @anthropic/claude-code   # or the appropriate installer

        # 4️⃣  Run the Claude Code review agent
        - name: Run Claude Code review
          env:
            CLAUDE_PAT: ${{ secrets.CLAUDE_PAT }}   # your personal access token
          run: |
            # The CLI should:
            #   a) Verify the push is not a draft/closed PR (not needed for plain pushes)
            #   b) Locate any CLAUDE.md files relevant to the changed paths
            #   c) Summarise the change set
            #   d) Spawn the five Sonnet agents for the detailed checks
            #   e) Score the issues, filter < 80, and produce a markdown report
            claude-code review \
              --repo "${{ github.repository }}" \
              --sha "${{ github.sha }}" \
              --token "$CLAUDE_PAT" \
              --output report.md

        # 5️⃣  Post the review as a comment on the commit
        - name: Post review comment
          if: always()
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          run: |
            if [ -s report.md ]; then
              gh api \
                -X POST \
                -H "Accept: application/vnd.github+json" \
                /repos/${{ github.repository }}/commits/${{ github.sha }}/comments \
                -f body="$(cat report.md)"
            fi
