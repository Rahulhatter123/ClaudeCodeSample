# This GitHub Actions workflow runs the Claude Code review tool on pushes to the master branch and on pull request events.

name: Claude Code Review on master pushes

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Claude Code CLI
        run: |
          npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code review
        env:
          CLAUDE_PAT: ${{ secrets.CLAUDE_PAT }}
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
        # run: |
        #   claude-code review \
        #     --repo "${{ github.repository }}" \
        #     --sha "${{ github.sha }}" \
        #     --token "$CLAUDE_PAT" \
        #     --min-score 80 \
        #     --output report.md
        if: github.event_name == 'pull_request'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.CLAUDE_PAT }}
          github_token: ${{ secrets.GIT_TOKEN }}
          prompt: |
            Review the latest pushed changes for bugs, security issues, and code quality.

      - name: Run Claude Code (Master Audit)
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          npm install -g @anthropic-ai/claude-code
          # Use the CLI directly for a general scan of the repository state
          claude-code scan --output report.md 
        env:
          CLAUDE_PAT: ${{ secrets.CLAUDE_PAT }}

      - name: Post review comment on commit
        if: always()
        env:
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          if [ -s report.md ]; then
            gh api \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              /repos/${{ github.repository }}/commits/${{ github.sha }}/comments \
              -f body="$(cat report.md)"
          fi