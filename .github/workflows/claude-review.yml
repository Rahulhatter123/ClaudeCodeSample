# This GitHub Actions workflow runs the Claude Code review tool on pushes to the master branch and on pull request events.

name: Claude Code Review on master pushes

on:
  push:
    branches:
      - master
      - dev
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # CRITICAL: Forces GitHub to download the actual code files for Snyk to see

      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk Code Test
        run: snyk code test --sarif-file-output=snyk.sarif
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        
      - name: Print the snyk sarif file
        run: cat snyk.sarif
      - name: Total security issues
        run: |
             length=$(cat snyk.sarif | jq '.runs[0].results | length')
             echo "RESULTS_LENGTH=$length" >> $GITHUB_ENV

      - name: Pass or fail the job
        run: |
            if [ "$RESULTS_LENGTH" -ne 0 ]; then
             echo "Job Failed"
             exit 1
            else
             echo "Papu Pass Ho Gaya"
            fi
               
      - name: Send notification on Slack using Webhooks
        uses: slackapi/slack-github-action@v1.24.0
        if: always()
        with:
          payload: |
                {
                  "text": "*The Snyk scan result for repo is: ${{job.status}}* \n *Number of vulnerability: ${{env.RESULTS_LENGTH}}* \n*Details*: https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}"
                }
        env:
          SLACK_WEBHOOK_URL: ${{secrets.slack_webhook_url}}
          
